# Ancien workflow Hostinger — désactivé
# Le site UPR Congo est hébergé sur Netlify.
# Conservé uniquement pour référence historique.

name: (disabled) Hostinger static publish

on:
  workflow_dispatch:
    # Désactivé : ne se lance plus automatiquement sur push main.
    # Pour réactiver un jour : remettre `push: branches: [main]`

permissions:
  contents: write

jobs:
  build-and-publish:
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build static site
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Publish out folder to hostinger-deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: hostinger-deploy
          publish_dir: ./out
          force_orphan: true
          commit_message: "deploy: update Hostinger static files"
