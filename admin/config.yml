backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "public/uploads"
public_folder: "/uploads"

locale: "fr"

site_url: "https://uprcongo.com"
display_url: "https://uprcongo.com"
logo_url: "/images/logo/logo-upr.png"

collections:
  - name: "actualites"
    label: "Actualités UPR"
    label_singular: "Article"
    folder: "content/actualites"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{titre}} — {{categorie}} — {{date}}"
    fields:
      - { label: "Titre de l'article", name: "titre", widget: "string", required: true }
      - { label: "Date de publication", name: "date", widget: "datetime", required: true }
      - label: "Catégorie"
        name: "categorie"
        widget: "select"
        required: true
        options:
          - "Communiqué"
          - "Déclaration"
          - "Mobilisation"
          - "Activité"
          - "Meeting"
          - "Vie du parti"
          - "Projet de société"
      - { label: "Article à la une", name: "featured", widget: "boolean", default: false, required: false }
      - { label: "Image d'illustration", name: "image", widget: "image", required: true }
      - { label: "Texte alternatif de l'image", name: "image_alt", widget: "string", required: true }
      - { label: "Résumé court", name: "description", widget: "text", required: true }
      - { label: "Auteur", name: "auteur", widget: "string", default: "Secrétariat National de l'Information et Presse / UPR", required: true }
      - { label: "Contenu complet", name: "body", widget: "markdown", required: true }

  - name: "communiques"
    label: "Communiqués officiels"
    label_singular: "Communiqué"
    folder: "content/communiques"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titre", name: "titre", widget: "string", required: true }
      - { label: "Date", name: "date", widget: "datetime", required: true }
      - { label: "Référence", name: "reference", widget: "string", required: false }
      - { label: "Résumé", name: "description", widget: "text", required: true }
      - { label: "Fichier PDF", name: "fichier_pdf", widget: "file", required: false }
      - { label: "Contenu du communiqué", name: "body", widget: "markdown", required: true }

  - name: "evenements"
    label: "Activités et événements"
    label_singular: "Événement"
    folder: "content/evenements"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titre", name: "titre", widget: "string", required: true }
      - { label: "Date", name: "date", widget: "datetime", required: true }
      - { label: "Lieu", name: "lieu", widget: "string", required: false }
      - { label: "Province", name: "province", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Résumé", name: "description", widget: "text", required: true }
      - { label: "Contenu", name: "body", widget: "markdown", required: true }